baseURL = 'https://jeonck.github.io/writing-diary/'
locale = 'ko-kr'
title = '매일 영어 일기'
theme = 'PaperMod'
paginate = 10

[params]
  env = 'production'
  title = '매일 영어 일기'
  description = '매일 한 문장으로 시작하는 영어 작문 다이어리 — 자동 생성 파이프라인'
  author = 'jeonck'
  defaultTheme = 'auto'
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = false
  tocopen = false

  [params.homeInfoParams]
    Title = '매일 영어 일기 👋'
    Content = '매일 하나의 영어 문장을 입력해두면, 그 문장을 바탕으로 짧은 일기와 응용 문장이 자동으로 생성되어 매일 아침 게시됩니다.'

  [[params.socialIcons]]
    name = 'github'
    url = 'https://github.com/jeonck/writing-diary'

[menu]
  [[menu.main]]
    identifier = 'input'
    name = '오늘의 문장 입력 ✏️'
    url = 'https://github.com/jeonck/writing-diary/edit/main/input/sentence.md'
    weight = 5
  [[menu.main]]
    identifier = 'posts'
    name = 'Posts'
    url = '/posts/'
    weight = 10
  [[menu.main]]
    identifier = 'tags'
    name = 'Tags'
    url = '/tags/'
    weight = 20
  [[menu.main]]
    identifier = 'search'
    name = 'Search'
    url = '/search/'
    weight = 30

[outputs]
  home = ['HTML', 'RSS', 'JSON']
