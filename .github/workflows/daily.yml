name: Daily English Diary

on:
  schedule:
    - cron: "14 22 * * *" # UTC 22:14 = KST 07:14 (다른 프로젝트와 겹침 방지로 분산)
  workflow_dispatch:
  push: # 사이트 변경 푸시 시 배포만 즉시 수행 (생성 단계는 스킵)
    branches: [main]
    paths:
      - "content/**"
      - "hugo.toml"
      - "archetypes/**"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-diary
  cancel-in-progress: false

jobs:
  generate:
    if: github.event_name != 'push'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate today's diary
        id: generate
        continue-on-error: true
        env:
          # CLAUDE_CODE_OAUTH_TOKEN 등록 시 구독 인증(claude-code), 없으면 API 키 과금(api)
          JUDGE_BACKEND: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN != '' && 'claude-code' || 'api' }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python pipeline/generate.py

      - name: Commit new diary post
        id: commit
        run: |
          git config user.name "diary-bot"
          git config user.email "actions@users.noreply.github.com"
          git add content/posts pipeline/state.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "신규 포스트 없음 — 커밋 스킵"
          else
            git commit -m "chore: daily diary $(date -u +%F)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Surface generation failure
        if: steps.generate.outcome == 'failure'
        run: |
          echo "::error::생성 단계 실패 (CLAUDE_CODE_OAUTH_TOKEN/크레딧 확인 필요)"
          exit 1

  deploy:
    needs: generate
    # 스케줄: 신규 포스트 있을 때만 / 수동·push: 항상 배포
    if: ${{ !cancelled() && (needs.generate.outputs.changed == 'true' || github.event_name == 'workflow_dispatch' || github.event_name == 'push') }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: main
          fetch-depth: 0

      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.161.1"
          extended: true

      - uses: actions/configure-pages@v5
        id: pages

      - name: Build site
        run: hugo --minify --baseURL "${{ steps.pages.outputs.base_url }}/"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - id: deployment
        uses: actions/deploy-pages@v4
